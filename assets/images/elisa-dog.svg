  <circle cx="200" cy="140" r="80" fill="#ffffff" filter="url(#shadowdog)"/>
  <circle cx="200" cy="140" r="80" fill="none" stroke="#c8ddf7" stroke-width="2"/>

  <!-- Animal SVG -->
  
    <!-- Gövde -->
    <rect x="165" y="138" width="80" height="46" rx="18" fill="#1a3a6b" opacity="0.85"/>
    <!-- Baş -->
    <circle cx="175" cy="122" r="28" fill="#1a3a6b" opacity="0.9"/>
    <!-- Sarkık kulaklar -->
    <path d="M150 110 Q140 112 138 128 Q137 142 150 144" fill="#4a7cc7" opacity="0.85"/>
    <path d="M200 110 Q208 112 208 128 Q208 140 200 142" fill="#4a7cc7" opacity="0.85"/>
