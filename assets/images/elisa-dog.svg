    <rect x="196" y="181" width="14" height="24" rx="6" fill="#4a7cc7" opacity="0.85"/>
    <rect x="216" y="180" width="14" height="24" rx="6" fill="#4a7cc7" opacity="0.85"/>
    <!-- Kuyruk (sallanır pozisyon) -->
    <path d="M245 148 Q265 135 268 152 Q270 165 258 168" fill="none" stroke="#4a7cc7" stroke-width="5" stroke-linecap="round"/>

  <!-- Label area -->
  <text x="200" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#1a3a6b">Köpek ELISA Kiti</text>
  <text x="200" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2d5aa0">Canine/Dog</text>
</svg>