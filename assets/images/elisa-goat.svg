cle cx="268" cy="282" r="4.5" fill="#c8ddf7" opacity="0.7" stroke="#7faee8" stroke-width="0.5"/><circle cx="298" cy="282" r="4.5" fill="#c8ddf7" opacity="0.7" stroke="#7faee8" stroke-width="0.5"/><circle cx="328" cy="282" r="4.5" fill="#c8ddf7" opacity="0.7" stroke="#7faee8" stroke-width="0.5"/><circle cx="358" cy="282" r="4.5" fill="#c8ddf7" opacity="0.7" stroke="#7faee8" stroke-width="0.5"/>

