cle cx="268" cy="282" r="4.5" fill="#c8ddf7" opacity="0.7" stroke="#7faee8" stroke-width="0.5"/><circle cx="298" cy="282" r="4.5" fill="#c8ddf7" opacity="0.7" stroke="#7faee8" stroke-width="0.5"/><circle cx="328" cy="282" r="4.5" fill="#c8ddf7" opacity="0.7" stroke="#7faee8" stroke-width="0.5"/><circle cx="358" cy="282" r="4.5" fill="#c8ddf7" opacity="0.7" stroke="#7faee8" stroke-width="0.5"/>

  <!-- Main illustration circle -->
  <circle cx="200" cy="140" r="90" fill="url(#circlehuman)" filter="url(#shadowhuman)" opacity="0.12"/>
  <circle cx="200" cy="140" r="80" fill="#ffffff" filter="url(#shadowhuman)"/>
  <circle cx="200" cy="140" r="80" fill="none" stroke="#c8ddf7" stroke-width="2"/>

  <!-- Animal SVG -->
  
    <!-- Baş -->
    <circle cx="200" cy="102" r="22" fill="#1a3a6b" opacity="0.9"/>
    <!-- Yüz -->
    <circle cx="200" cy="102" r="18" fill="#4a7cc7" opacity="0.8"/>
    <!-- Gözler -->
    <circle cx="193" cy="100" r="2.5" fill="#ffffff"/>
    <circle cx="207" cy="100" r="2.5" fill="#ffffff"/>
    <!-- Gülümseme -->
    <path d="M193 107 Q200 113 207 107" fill="none" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Vücut -->
    <path d="M176 128 Q200 122 224 128 L230 175 Q200 180 170 175 Z" fill="#1a3a6b" opacity="0.85"/>
    <!-- Kollar -->
    <path d="M176 130 L158 155 Q155 160 160 162 L170 145" fill="#1a3a6b" opacity="0.8"/>
    <path d="M224 130 L242 155 Q245 160 240 162 L230 145" fill="#1a3a6b" opacity="0.8"/>
    <!-- Bacaklar -->
    <rect x="182" y="174" width="16" height="25" rx="6" fill="#1a3a6b" opacity="0.8"/>
    <rect x="202" y="174" width="16" height="25" rx="6" fill="#1a3a6b" opacity="0.8"/>
    <!-- DNA ikonu sağ üst -->
    <g transform="translate(248,82)" opacity="0.5">
      <path d="M0,0 Q8,8 0,16 Q-8,24 0,32" fill="none" stroke="#7faee8" stroke-width="2"/>
      <path d="M8,0 Q0,8 8,16 Q16,24 8,32" fill="none" stroke="#7faee8" stroke-width="2"/>
      <line x1="1" y1="8" x2="7" y2="8" stroke="#7faee8" stroke-width="1.5"/>
      <line x1="1" y1="16" x2="7" y2="16" stroke="#7faee8" stroke-width="1.5"/>
      <line x1="1" y1="24" x2="7" y2="24" stroke="#7faee8" stroke-width="1.5"/>
    </g>

  <!-- Label area -->
  <text x="200" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#1a3a6b">İnsan ELISA Kiti</text>
  <text x="200" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2d5aa0">Human</text>
</svg>