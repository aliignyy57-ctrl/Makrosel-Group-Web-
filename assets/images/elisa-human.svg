<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">

  <defs>
    <linearGradient id="bghuman" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#eef3fc"/>
      <stop offset="100%" stop-color="#f7f9ff"/>
    </linearGradient>
    <linearGradient id="circlehuman" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4a7cc7"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="animalhuman" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8ddf7"/>
    </linearGradient>
    <filter id="shadowhuman">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bghuman)" rx="16"/>

  <!-- Decorative molecules -->
  
    <g opacity="0.25">
      <circle cx="30" cy="30" r="10" fill="none" stroke="#4a7cc7" stroke-width="1.5"/>
      <circle cx="56" cy="20" r="7" fill="none" stroke="#4a7cc7" stroke-width="1.5"/>
      <circle cx="20" cy="56" r="7" fill="none" stroke="#4a7cc7" stroke-width="1.5"/>
      <line x1="38" y1="24" x2="51" y2="24" stroke="#4a7cc7" stroke-width="1.5"/>
      <line x1="24" y1="38" x2="24" y2="51" stroke="#4a7cc7" stroke-width="1.5"/>
    </g>
    <g opacity="0.2" transform="translate(370,270) rotate(180)">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#4a7cc7" stroke-width="1.5"/>
      <circle cx="26" cy="-10" r="7" fill="none" stroke="#4a7cc7" stroke-width="1.5"/>
      <circle cx="-10" cy="26" r="7" fill="none" stroke="#4a7cc7" stroke-width="1.5"/>
      <line x1="8" y1="-6" x2="21" y2="-6" stroke="#4a7cc7" stroke-width="1.5"/>
      <line x1="-6" y1="8" x2="-6" y2="21" stroke="#4a7cc7" stroke-width="1.5"/>
    </g>

  <!-- ELISA well plate strip -->
  <rect x="16" y="258" width="368" height="32" rx="8" fill="#ffffff" opacity="0.7" stroke="#c8ddf7" stroke-width="1"/>
  <text x="20" y="268" font-size="8" fill="#6b7280" opacity="0.7" font-family="monospace">96-well plate</text>
