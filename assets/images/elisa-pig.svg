    <!-- Kıvrık kuyruk -->
    <path d="M247 148 Q260 140 262 152 Q262 162 252 162 Q244 162 244 154" fill="none" stroke="#4a7cc7" stroke-width="4" stroke-linecap="round"/>

  <!-- Label area -->
  <text x="200" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#1a3a6b">Domuz ELISA Kiti</text>
  <text x="200" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2d5aa0">Porcine/Pig</text>
