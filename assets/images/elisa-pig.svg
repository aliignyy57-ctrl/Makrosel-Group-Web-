      <line x1="8" y1="-6" x2="21" y2="-6" stroke="#4a7cc7" stroke-width="1.5"/>
      <line x1="-6" y1="8" x2="-6" y2="21" stroke="#4a7cc7" stroke-width="1.5"/>
    </g>

