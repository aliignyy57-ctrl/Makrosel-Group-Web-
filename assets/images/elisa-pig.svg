<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">

  <defs>
    <linearGradient id="bgpig" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#eef3fc"/>
      <stop offset="100%" stop-color="#f7f9ff"/>
    </linearGradient>
    <linearGradient id="circlepig" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4a7cc7"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="animalpig" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8ddf7"/>
    </linearGradient>
    <filter id="shadowpig">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1a3a6b" flood-opacity="0.15"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="400" height="300" fill="url(#bgpig)" rx="16"/>

  <!-- Decorative molecules -->
  
    <g opacity="0.25">
      <circle cx="30" cy="30" r="10" fill="none" stroke="#4a7cc7" stroke-width="1.5"/>
      <circle cx="56" cy="20" r="7" fill="none" stroke="#4a7cc7" stroke-width="1.5"/>
