  <circle cx="200" cy="140" r="80" fill="#ffffff" filter="url(#shadowcat)"/>
  <circle cx="200" cy="140" r="80" fill="none" stroke="#c8ddf7" stroke-width="2"/>

  <!-- Animal SVG -->
  
    <!-- Gövde -->
    <ellipse cx="200" cy="158" rx="36" ry="28" fill="#1a3a6b" opacity="0.85"/>
    <!-- Kuyruk -->
    <path d="M236 155 Q262 145 264 165 Q264 180 248 182" fill="none" stroke="#1a3a6b" stroke-width="8" stroke-linecap="round"/>
