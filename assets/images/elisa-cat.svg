    <!-- Bacaklar -->
    <rect x="180" y="182" width="13" height="20" rx="6" fill="#4a7cc7" opacity="0.85"/>
    <rect x="207" y="182" width="13" height="20" rx="6" fill="#4a7cc7" opacity="0.85"/>

  <!-- Label area -->
  <text x="200" y="232" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700" fill="#1a3a6b">Kedi ELISA Kiti</text>
  <text x="200" y="248" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="11" fill="#2d5aa0">Feline/Cat</text>
