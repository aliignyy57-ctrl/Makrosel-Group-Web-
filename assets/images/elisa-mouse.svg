      <stop offset="0%" stop-color="#eef3fc"/>
      <stop offset="100%" stop-color="#f7f9ff"/>
    </linearGradient>
    <linearGradient id="circlemouse" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#4a7cc7"/>
      <stop offset="100%" stop-color="#1a3a6b"/>
    </linearGradient>
    <linearGradient id="animalmouse" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#c8ddf7"/>
    </linearGradient>
    <filter id="shadowmouse">
